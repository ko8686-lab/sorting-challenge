<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排序法終極挑戰：榮耀證書賽</title>
    <style>
        :root {
            --poker-green: #1a5e3a;
            --card-white: #ffffff;
            --accent-gold: #f1c40f;
            --error-red: #ff4757;
            --ui-blue: #3498db;
            --bg-dark: #2c3e50;
        }

        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg-dark); color: #fff; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 95%; max-width: 900px; padding: 20px; text-align: center; }
        
        .stats-bar { display: flex; justify-content: space-between; background: rgba(0,0,0,0.6); padding: 12px 25px; border-radius: 50px; margin-bottom: 15px; font-size: 1.2rem; border: 1px solid rgba(255,255,255,0.2); }
        
        #mission-badge {
            font-size: 1.8rem; color: var(--accent-gold); background: rgba(0,0,0,0.4);
            padding: 15px; margin: 10px 0; border-radius: 12px; border: 3px solid var(--accent-gold);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); font-weight: 900;
        }

        .timer-container { width: 100%; height: 12px; background: rgba(255,255,255,0.2); border-radius: 6px; margin-bottom: 20px; overflow: hidden; }
        #timer-bar { width: 100%; height: 100%; background: var(--accent-gold); transition: width 0.1s linear; }

        #game-board { background: var(--poker-green); border-radius: 20px; padding: 30px 10px; box-shadow: inset 0 0 80px rgba(0,0,0,0.6); position: relative; min-height: 280px; border: 5px solid #2d3436; }
        .cards-container { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 25px; }
        .card-slot { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        
        .card {
            width: 60px; height: 90px; background: var(--card-white); color: #333; border-radius: 8px;
            display: flex; justify-content: center; align-items: center; font-size: 1.6rem; font-weight: bold;
            box-shadow: 4px 6px 12px rgba(0,0,0,0.5); cursor: pointer; transition: 0.2s; border: 3px solid transparent;
        }
        .card.sorted { border-top: 6px solid var(--accent-gold); }
        .card.comparing { border: 4px solid var(--accent-gold); transform: translateY(-12px); }
        .card.selected { border: 4px solid var(--ui-blue); transform: translateY(-15px); z-index: 5; }

        .pos-btn {
            width: 30px; height: 30px; background: rgba(0,0,0,0.5); color: #fff; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; font-size: 14px; cursor: pointer;
            transition: 0.2s; border: 1px solid rgba(255,255,255,0.3);
        }

        .footer-note {
            margin-top: 25px; font-size: 1.2rem; color: #fff200; background: rgba(0,0,0,0.4);
            padding: 12px 20px; border-radius: 8px; font-weight: bold; display: inline-block; border-left: 5px solid var(--accent-gold);
        }

        #controls { margin: 20px 0; }
        .game-btn { padding: 12px 30px; font-size: 1.1rem; cursor: pointer; border: none; border-radius: 8px; margin: 0 10px; font-weight: bold; color: white; transition: 0.2s; }
        .btn-swap { background: var(--accent-gold); color: #2d3436; }
        .btn-keep { background: var(--ui-blue); }

        #cert-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); justify-content: center; align-items: center; z-index: 9999;
        }
        .cert-card { background: #fff; color: #333; padding: 40px; border-radius: 15px; border: 10px double #c5a059; width: 85%; max-width: 500px; text-align: center; }
        .rank-box { font-size: 2.8rem; color: #d35400; margin: 20px 0; font-weight: 900; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .shake { animation: shake 0.2s 3; }
    </style>
</head>
<body>

<div class="container" id="game-ui">
    <div class="stats-bar">
        <span>生命值: <span id="lives">❤️❤️❤️❤️❤️</span></span>
        <span id="level-title">準備挑戰...</span>
    </div>
    
    <div id="mission-badge">點擊下方按鈕開始挑戰</div>

    <div class="timer-container">
        <div id="timer-bar"></div>
    </div>

    <div id="game-board">
        <div class="cards-container" id="board"></div>
        <div id="controls" style="display:none;">
            <button class="btn-swap game-btn" onclick="handleBubble(true)">🔄 需要交換</button>
            <button class="btn-keep game-btn" onclick="handleBubble(false)">➡️ 不用交換</button>
        </div>
        <button id="start-btn" class="game-btn btn-keep" onclick="startGame()" style="display:block; margin: 20px auto; font-size: 1.5rem;">🏆 進入排序賽</button>
    </div>

    <div class="footer-note">
        💡 規則：入門/基礎級限時 30s，進階/專業級 40s。答錯或逾時扣除 ❤️。
    </div>
</div>

<div id="cert-screen">
    <div class="cert-card">
        <p>CONGRATULATIONS</p>
        <h2>演算法挑戰證書</h2>
        <hr>
        <p>恭喜玩家榮獲等級：</p>
        <div class="rank-box" id="final-rank">入門級</div>
        <p id="final-stats">完成題數: 0/12</p>
        <p id="final-msg">你是演算法界的明日之星！</p>
        <button class="game-btn btn-keep" onclick="resetGame()" style="margin-top:20px; background: #8e44ad;">🔄 重新挑戰</button>
    </div>
</div>

<script>
    const LEVELS = [
        { name: '入門級', range: 30, count: 6, time: 30, questions: 3 },
        { name: '基礎級', range: 50, count: 8, time: 30, questions: 3 },
        { name: '進階級', range: 50, count: 10, time: 40, questions: 3 },
        { name: '專業級', range: 50, count: 10, time: 40, questions: 3, reverse: true }
    ];

    let currentLevelIdx = 0;
    let currentQuestionIdx = 0;
    let lives = 5;
    let cards = [];
    let currentAlgo = ''; 
    let sortedCount = 0;
    let bubblePtr = 0;
    let selectedIdx = -1;
    let timeLeft = 0;
    let timerInterval = null;
    let isGameRunning = false;

    // 啟動遊戲
    function startGame() {
        document.getElementById('start-btn').style.display = 'none';
        isGameRunning = true;
        initQuestion();
    }

    // 修正：重新挑戰函數
    function resetGame() {
        // 1. 重置所有變數
        currentLevelIdx = 0;
        currentQuestionIdx = 0;
        lives = 5;
        isGameRunning = false;
        clearInterval(timerInterval);
        
        // 2. 恢復 UI 狀態
        document.getElementById('cert-screen').style.display = 'none';
        document.getElementById('start-btn').style.display = 'block';
        document.getElementById('board').innerHTML = '';
        document.getElementById('controls').style.display = 'none';
        document.getElementById('timer-bar').style.width = "100%";
        document.getElementById('mission-badge').innerText = "點擊下方按鈕開始挑戰";
        document.getElementById('level-title').innerText = "準備挑戰...";
        updateLives();
        
        // 3. 顯示開始按鈕
        updateStatus("挑戰已重置，準備好了嗎？", "info");
    }

    function initQuestion() {
        if (lives <= 0) return endGame();
        
        const config = LEVELS[currentLevelIdx];
        document.getElementById('level-title').innerText = `等級: ${config.name} (${currentQuestionIdx + 1}/${config.questions})`;
        
        const pool = Array.from({length: config.range}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
        cards = pool.slice(0, config.count);
        if (config.reverse) cards.sort((a,b) => b - a);

        const algos = ['bubble', 'selection', 'insertion'];
        currentAlgo = config.reverse ? 'insertion' : algos[Math.floor(Math.random() * 3)];
        
        document.getElementById('mission-badge').innerText = `目前任務：【${getAlgoName(currentAlgo)}】`;
        
        sortedCount = 0;
        bubblePtr = 0;
        selectedIdx = -1;
        timeLeft = config.time;
        
        startTimer();
        render();
    }

    function render() {
        const board = document.getElementById('board');
        const controls = document.getElementById('controls');
        board.innerHTML = '';
        controls.style.display = (currentAlgo === 'bubble') ? 'block' : 'none';

        cards.forEach((val, i) => {
            const slot = document.createElement('div');
            slot.className = 'card-slot';
            const card = document.createElement('div');
            card.className = 'card';
            
            if (currentAlgo === 'selection' && i < sortedCount) card.classList.add('sorted');
            if (currentAlgo === 'insertion' && i <= sortedCount) card.classList.add('sorted');
            if (currentAlgo === 'bubble' && i >= cards.length - sortedCount) card.classList.add('sorted');
            if (currentAlgo === 'bubble' && (i === bubblePtr || i === bubblePtr + 1)) card.classList.add('comparing');
            if (currentAlgo === 'insertion' && i === selectedIdx) card.classList.add('selected');

            card.innerText = val;
            card.onclick = () => handleCardClick(i);
            const posBtn = document.createElement('div');
            posBtn.className = 'pos-btn';
            posBtn.innerText = i + 1;
            posBtn.onclick = () => handlePosClick(i);

            slot.appendChild(card);
            slot.appendChild(posBtn);
            board.appendChild(slot);
        });
    }

    function handleCardClick(idx) {
        if (!isGameRunning) return;
        if (currentAlgo === 'selection') checkSelection(idx);
        else if (currentAlgo === 'insertion' && idx === sortedCount + 1) {
            selectedIdx = idx;
            render();
        }
    }

    function handlePosClick(posIdx) {
        if (currentAlgo === 'insertion' && selectedIdx !== -1) checkInsertion(posIdx);
    }

    function handleBubble(userSwap) {
        const v1 = cards[bubblePtr];
        const v2 = cards[bubblePtr+1];
        if (userSwap === (v1 > v2)) {
            if (v1 > v2) [cards[bubblePtr], cards[bubblePtr+1]] = [cards[bubblePtr+1], cards[bubblePtr]];
            bubblePtr++;
            if (bubblePtr >= cards.length - 1 - sortedCount) { bubblePtr = 0; sortedCount++; }
            checkWin();
        } else fail();
    }

    function checkSelection(idx) {
        let minIdx = sortedCount;
        for (let j = sortedCount + 1; j < cards.length; j++) if (cards[j] < cards[minIdx]) minIdx = j;
        if (idx === minIdx) {
            [cards[sortedCount], cards[minIdx]] = [cards[minIdx], cards[sortedCount]];
            sortedCount++;
            checkWin();
        } else fail();
    }

    function checkInsertion(posIdx) {
        const val = cards[selectedIdx];
        let correctIdx = 0;
        while (correctIdx <= sortedCount && cards[correctIdx] < val) correctIdx++;
        if (posIdx === correctIdx) {
            const [item] = cards.splice(selectedIdx, 1);
            cards.splice(posIdx, 0, item);
            sortedCount++;
            selectedIdx = -1;
            checkWin();
        } else fail();
    }

    function checkWin() {
        render();
        if (sortedCount >= cards.length - 1) {
            clearInterval(timerInterval);
            setTimeout(() => {
                currentQuestionIdx++;
                if (currentQuestionIdx >= LEVELS[currentLevelIdx].questions) { currentQuestionIdx = 0; currentLevelIdx++; }
                if (currentLevelIdx >= LEVELS.length) endGame(); else initQuestion();
            }, 800);
        }
    }

    function fail() {
        lives--;
        updateLives();
        document.getElementById('game-board').classList.add('shake');
        setTimeout(() => document.getElementById('game-board').classList.remove('shake'), 400);
        if (lives <= 0) endGame();
    }

    function startTimer() {
        clearInterval(timerInterval);
        const maxTime = LEVELS[currentLevelIdx].time;
        timeLeft = maxTime;
        timerInterval = setInterval(() => {
            timeLeft -= 0.1;
            document.getElementById('timer-bar').style.width = (timeLeft / maxTime) * 100 + "%";
            if (timeLeft <= 0) { clearInterval(timerInterval); fail(); if (lives > 0) initQuestion(); }
        }, 100);
    }

    function updateLives() { document.getElementById('lives').innerText = "❤️".repeat(Math.max(0, lives)); }
    function getAlgoName(key) { return { bubble: '氣泡排序法', selection: '選擇排序法', insertion: '插入排序法' }[key]; }
    function updateStatus(msg, type) { /* 僅用於 reset 提示 */ }

    function endGame() {
        isGameRunning = false;
        clearInterval(timerInterval);
        document.getElementById('cert-screen').style.display = 'flex';
        const finalLvl = LEVELS[Math.min(currentLevelIdx, 3)].name;
        document.getElementById('final-rank').innerText = lives > 0 ? "專業級大師" : finalLvl;
        document.getElementById('final-stats').innerText = `最高解鎖關卡：${finalLvl}`;
    }
</script>

</body>
</html>
